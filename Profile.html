<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Profile Selector</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .profile-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        
        .image-wrapper {
            position: absolute; /* Essential for positioning the icon inside */
            width: 150px;
            height: 150px;
        }
        
        .image-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* Makes it circular */
            object-fit: cover;  /* Prevents image stretching */
            border: 3px solid #290ec5;
            box-shadow: 0px 2px 10px rgba(7, 4, 197, 0.1);
        }
        
        /* Hide the ugly default input text */
        #file-input {
            display: none;
        }
        h1{
            color: #290ec5;
        }
        
        /* Style the floating camera button */
        .icon-button {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #90a9e9;
            width: 34px;
            height: 28px;
            border-radius: 2px 17px 5px 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        
        .icon-button:hover {
            background-color: #4c6ab4;
            transform: scale(1.1);
        }
        
        .camera-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
     <h1>Web Profile Selector</h1>
    
    <div class="profile-container">
    <div class="image-wrapper">
        <img src="https://via.placeholder.com/150" alt="">
        
        <label for="file-input" class="icon-button">
            <span  class="camera-icon">📷</span>
        </label>
    </div>

    <input type="file" id="file-input" accept="image/*">
</div>
    <script>
        const image = document.querySelector("img");
        const input = document.querySelector("input");

        input.addEventListener("change", () => {
            image.src = URL.createObjectURL(input.files[0]);
        });
    </script>
</body>
</html>
